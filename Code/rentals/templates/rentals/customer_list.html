{% extends "rentals/base.html" %}
{% block content %}
<h1>Customers</h1>


<a href="{% url 'add_customer' %}" class="btn">Add New Customer</a>

<style>
.btn {
    display: inline-block;
    padding: 8px 14px;
    background: #4caf50;
    color: white;
    text-decoration: none;
    border-radius: 4px;
    margin-bottom: 15px;
}
.btn:hover {
    background: #45a049;
}
</style>
<table border="1" cellpadding="5">
    <thead>
        <tr>
            <th>First Name</th>
            <th>Last Name</th>
            <th>Email</th>
            <th>Phone #</th>
        </tr>
    </thead>
    <tbody>
        {% for customer in customers %}
        <tr>
            <td>{{ customer.first_name }}</td> 
            <td>{{ customer.last_name }}</td>
            <td>{{ customer.email }}</td>
            <td>{{ customer.phone_number }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
